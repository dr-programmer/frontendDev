<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Задача 4 – Количка за пазаруване с useReducer</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111a2e;
      --card2: #0e1628;
      --text: #e7eefc;
      --muted: #a7b4d6;
      --border: rgba(255,255,255,0.12);
      --primary: #017ae0;
      --success: #00bc89;
      --danger: #ff5241;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(900px 500px at 15% -10%, #1a2b5c, transparent 55%),
                  radial-gradient(700px 400px at 90% 0%, #193a4a, transparent 45%), var(--bg);
      color: var(--text);
      min-height: 100svh;
      padding: 28px 16px;
    }
    .layout {
      width: min(960px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }
    h1 { font-size: 18px; font-weight: 700; color: var(--muted); margin-bottom: 20px;
         grid-column: 1 / -1; }
    .section-title {
      font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); margin-bottom: 14px;
    }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 55%), var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 0;
    }
    .product {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .product-emoji {
      font-size: 32px;
      width: 48px; height: 48px;
      background: rgba(1,122,224,0.15);
      border-radius: 10px;
      display: grid; place-items: center;
    }
    .product-name { font-size: 14px; font-weight: 700; }
    .product-price { font-size: 13px; color: var(--success); font-weight: 600; }
    .cart-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-name { flex: 1; font-size: 14px; font-weight: 600; }
    .cart-item-price { font-size: 13px; color: var(--muted); }
    .qty-row { display: flex; align-items: center; gap: 6px; }
    .qty { font-size: 14px; font-weight: 700; min-width: 24px; text-align: center; }
    .summary-row {
      display: flex; justify-content: space-between;
      font-size: 14px; padding: 6px 0;
    }
    .summary-row.total { font-weight: 800; font-size: 16px; color: var(--success); border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
    button {
      padding: 8px 14px;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; color: #fff;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    .btn-primary { background: var(--primary); }
    .btn-sm { padding: 4px 10px; font-size: 12px; background: rgba(255,255,255,0.12); }
    .btn-danger { background: var(--danger); }
    .btn-neutral { background: rgba(255,255,255,0.1); color: var(--text); }
    .empty { font-size: 13px; color: var(--muted); font-style: italic; text-align: center; padding: 16px 0; }
  </style>
</head>
<body>
  <div style="width:min(960px,100%); margin:0 auto; padding:0">
    <div style="padding:0 0 0 0">
      <h1 style="font-size:18px;font-weight:700;color:#a7b4d6;margin-bottom:20px;font-family:system-ui">
        Задача 4 – Количка за пазаруване с useReducer
      </h1>
    </div>
  </div>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>

  <script type="text/babel">
    const { useReducer } = React;

    const PRODUCTS = [
      { id: 1, name: "React тениска",    price: 29.99, emoji: "👕" },
      { id: 2, name: "JavaScript чаша",  price: 14.99, emoji: "☕" },
      { id: 3, name: "CSS стикери",      price: 4.99,  emoji: "🎨" },
      { id: 4, name: "Node.js шапка",    price: 24.99, emoji: "🧢" },
    ];

    function cartReducer(state, action) {
      switch (action.type) {
        case 'ADD_ITEM': {
          const existing = state.items.find(i => i.product.id === action.product.id);
          if (existing) {
            return {
              items: state.items.map(i =>
                i.product.id === action.product.id
                  ? { ...i, quantity: i.quantity + 1 }
                  : i
              ),
            };
          }
          return { items: [...state.items, { product: action.product, quantity: 1 }] };
        }
        case 'REMOVE_ITEM':
          return { items: state.items.filter(i => i.product.id !== action.id) };
        case 'UPDATE_QUANTITY':
          return {
            items: state.items
              .map(i => i.product.id === action.id
                ? { ...i, quantity: Math.max(0, action.quantity) }
                : i
              )
              .filter(i => i.quantity > 0),
          };
        case 'CLEAR_CART':
          return { items: [] };
        default:
          return state;
      }
    }

    function ProductCatalog({ onAdd }) {
      return (
        <div className="card">
          <div className="section-title">Каталог с продукти</div>
          <div className="product-grid">
            {PRODUCTS.map(p => (
              <div key={p.id} className="product">
                <div className="product-emoji">{p.emoji}</div>
                <div className="product-name">{p.name}</div>
                <div className="product-price">{p.price.toFixed(2)} лв.</div>
                <button className="btn-primary" onClick={() => onAdd(p)}>+ Добави</button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function CartItem({ item, onUpdateQty, onRemove }) {
      return (
        <div className="cart-item">
          <span style={{ fontSize: 20 }}>{item.product.emoji}</span>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="cart-item-name">{item.product.name}</div>
            <div className="cart-item-price">
              {item.product.price.toFixed(2)} × {item.quantity} = {(item.product.price * item.quantity).toFixed(2)} лв.
            </div>
          </div>
          <div className="qty-row">
            <button className="btn-sm" onClick={() => onUpdateQty(item.quantity - 1)}>−</button>
            <span className="qty">{item.quantity}</span>
            <button className="btn-sm" onClick={() => onUpdateQty(item.quantity + 1)}>+</button>
          </div>
          <button className="btn-danger" style={{ padding: "4px 10px", fontSize: 12 }} onClick={onRemove}>✕</button>
        </div>
      );
    }

    function CartSummary({ totalItems, totalPrice, onClear }) {
      return (
        <div style={{ marginTop: 14 }}>
          <div className="summary-row">
            <span>Артикули:</span>
            <span>{totalItems}</span>
          </div>
          <div className="summary-row total">
            <span>Общо:</span>
            <span>{totalPrice.toFixed(2)} лв.</span>
          </div>
          {totalItems > 0 && (
            <div style={{ marginTop: 12, display: "flex", gap: 8, flexWrap: "wrap" }}>
              <button className="btn-primary" style={{ flex: 1 }}>Купи сега</button>
              <button className="btn-neutral" onClick={onClear}>Изчисти</button>
            </div>
          )}
        </div>
      );
    }

    function ShoppingApp() {
      const [cart, dispatch] = useReducer(cartReducer, { items: [] });

      const totalItems = cart.items.reduce((sum, i) => sum + i.quantity, 0);
      const totalPrice = cart.items.reduce((sum, i) => sum + i.product.price * i.quantity, 0);

      return (
        <div className="layout">
          <div>
            <ProductCatalog onAdd={(product) => dispatch({ type: 'ADD_ITEM', product })} />
          </div>
          <div className="card">
            <div className="section-title">Количка ({totalItems} арт.)</div>
            {cart.items.length === 0
              ? <div className="empty">Количката е празна</div>
              : cart.items.map(item => (
                  <CartItem
                    key={item.product.id}
                    item={item}
                    onUpdateQty={(qty) => dispatch({ type: 'UPDATE_QUANTITY', id: item.product.id, quantity: qty })}
                    onRemove={() => dispatch({ type: 'REMOVE_ITEM', id: item.product.id })}
                  />
                ))
            }
            <CartSummary
              totalItems={totalItems}
              totalPrice={totalPrice}
              onClear={() => dispatch({ type: 'CLEAR_CART' })}
            />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ShoppingApp />);
  </script>
</body>
</html>
